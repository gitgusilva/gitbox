<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitBox Loading</title>
    <style>
        body,
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-app-region: drag;
            overflow: hidden;
        }

        .container {
            background-color: var(--sp-bg, #1a1a1a);
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--sp-border, #2d2d2d);
        }

        .logo {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            animation: pulse 2.5s infinite ease-in-out;
        }

        .title {
            color: var(--sp-text, #ffffff);
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .loader {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            background-color: var(--sp-surface, #252526);
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, transparent, var(--sp-accent, #3b82f6), transparent);
            animation: move 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.8;
            }
        }

        @keyframes move {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(350%);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="logo" src="./icon.png" alt="GitBox Logo">
        <div class="title">GITBOX</div>
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
    </div>
</body>

</html>
